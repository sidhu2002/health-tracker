name: Build & Release Watch App

on:
  push:
    branches:
      - main
    paths:
      - 'watch-app/**'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Build APK
        env:
          PROD_WATCH_TOKEN: ${{ secrets.PROD_WATCH_TOKEN }}
        run: |
          cd watch-app
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Update Latest Release
        uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "latest"
          prerelease: false
          title: "Latest Auto-Build"
          files: |
            watch-app/app/build/outputs/apk/debug/app-debug.apk
